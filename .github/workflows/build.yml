name: Build Debian Image

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo rm -f /var/lib/apt/lists/lock
          sudo apt-get update
          sudo apt-get install -y debootstrap e2fsprogs

      - name: Build debian.ext3
        run: sudo bash MakeImage.sh

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: Debian for Kindle K3
          files: |
            debian.ext3
            RunBeforeDebian.sh
            RunDebian.sh
            UpdateInitScript.sh
